<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script src="../js/checkout.js" type=module></script>
  </head>

  <body>
    <header id="main-header" class="divider"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>



        <form action="">
          <fieldset>
            <legend>Customer</legend>
            <label for="fname">First Name</label>
            <input type="text" id="fname" required>

            <label for="lname">Last Name</label>
            <input type="text" id="lname" required>
          </fieldset>

          <fieldset>
            <legend>Billing & Shipping Address</legend>
            <label for="street">Street Address</label>
            <input type="text" id="street" required>

            <label for="city">City</label>
            <input type="text" id="city" required>

            <label for="state">State</label>
            <input type="text" id="state" required>

            <label for="zipcode"></label> required
            <input type="text" id="zipcode">
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label for="credit">Credit Card Number</label>
            <input type="text" id="credit" placeholder="1234 2221 4535 4634" required>
            
            <label for="exp">Expiration Date</label>
            <input type="text" id="exp" placeholder="MM/YY" required>

            <label for="sc">Security Code</label>
            <input type="text" id="sc" placeholder="123" required>
          </fieldset>

          <button type="submit">Chekout Button</button>
        </form>

        <section class="calculations">
          <p class="subtotal">Subtotal:<span id="subtotal"></span></p>
          <p class="tax">Tax:<span id="tax"> $6</span></p>
          <p class="shipping-estimate">Shipping Estimate:<span id="shipping-estimate"> $10 for the first item, $2 each after that.</span></p>
          <p class="total">Order Total:<span id="total"></span></p>
        </section>


      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Checkout</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/checkout.js" type="module"></script>
</head>

<body>
  <header class="divider" id="main-header"></header>

  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>

      <form id="checkout" name="checkout">
        <fieldset>
          <legend>Customer</legend>
          <label>First Name<input type="text" name="fname" required /></label>
          <label>Last Name<input type="text" name="lname" required /></label>
          <label>Street Address<input type="text" name="street" required /></label>
          <label>City<input type="text" name="city" required /></label>
          <label>State<input type="text" name="state" required /></label>
          <label>Zip Code<input type="text" name="zip" id="zip" required /></label>
        </fieldset>

        <fieldset>
          <legend>Payment</legend>
          <label>Credit Card Number<input type="text" name="cardNumber" value="1234123412341234" required /></label>
          <label>Expiration Date<input type="text" name="expiration" value="12/28" required /></label>
          <label>Security Code<input type="text" name="code" value="123" required /></label>
        </fieldset>

        <fieldset class="checkout-summary">
          <legend>Order Summary</legend>
          <p>Subtotal (<span id="num-items">0</span>): <span id="cartTotal">$0.00</span></p>
          <p>Shipping Estimate: <span id="shipping">$0.00</span></p>
          <p>Tax: <span id="tax">$0.00</span></p>
          <p><b>Order Total: <span id="orderTotal">$0.00</span></b></p>
        </fieldset>

        <button id="checkoutSubmit" type="submit">Checkout</button>
      </form>
    </section>
  </main>

  <footer id="main-footer"></footer>
</body>

</html>
